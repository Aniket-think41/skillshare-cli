name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: macos-latest
            target: macos-arm64
          - os: windows-latest
            target: windows-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      # Build from the top-level run.py shim (NOT skillshare_cli/main.py) so the
      # whole package is bundled and relative imports resolve. --collect-submodules
      # is cheap insurance that nothing in the package is missed; --hidden-import
      # tkinter keeps the GUI commands (panel/watch) working under --onefile.
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name skillshare \
            --collect-submodules skillshare_cli \
            --collect-submodules truststore \
            --hidden-import tkinter \
            run.py
          if [ "${{ matrix.target }}" = "windows-amd64" ]; then
            mv dist/skillshare.exe dist/skillshare-windows-amd64.exe
          else
            mv dist/skillshare dist/skillshare-${{ matrix.target }}
          fi
        shell: bash

      - name: Smoke-test the binary
        run: |
          if [ "${{ matrix.target }}" = "windows-amd64" ]; then
            ./dist/skillshare-windows-amd64.exe --help
          else
            ./dist/skillshare-${{ matrix.target }} --help
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skillshare-${{ matrix.target }}
          path: dist/skillshare-*

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/skillshare-cli
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: skillshare-*
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
